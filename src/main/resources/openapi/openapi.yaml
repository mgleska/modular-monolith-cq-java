      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    com.mgleska.mmcqjava2.user.action.command.AdminLoginCmd.ParamDto:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
      required:
      - email
    com.mgleska.mmcqjava2.user.action.command.AdminLoginCmd.ResultDto:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    com.mgleska.mmcqjava2.offer.action.command.ChangeVisibilityCmd.ParamDto:
      type: object
      properties:
