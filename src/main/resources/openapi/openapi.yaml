        productEan:
          type: string
          minLength: 1
        productName:
          type: string
          minLength: 1
        price:
          type: integer
          format: int32
        lowestPrice:
          type: integer
          format: int32
        imageUrl:
          type: string
          minLength: 1
        quantity:
          type: integer
          format: int32
