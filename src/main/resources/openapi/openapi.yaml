    com.mgleska.mmcqjava2.shared.CustomExceptionHandler.ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        error:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        errors:
          type: array
          items:
            $ref: "#/components/schemas/com.mgleska.mmcqjava2.shared.CustomExceptionHandler.FieldError"
        path:
          type: string
          minLength: 1
        timestamp:
          type: string
          minLength: 1
      required:
      - error
      - message
      - path
      - status
      - timestamp
    com.mgleska.mmcqjava2.shared.CustomExceptionHandler.FieldError:
      type: object
      properties:
        field:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
      required:
      - field
      - message
    com.mgleska.mmcqjava2.customer.action.command.LoginCmd.ParamDto:
      type: object
      properties:
        customerId:
          type: integer
          format: int32
      required:
      - customerId
    com.mgleska.mmcqjava2.customer.action.command.LoginCmd.ResultDto:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
