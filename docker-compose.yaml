name: modular-monolith-cq-java

services:

  java-api:
    build:
      context: docker
      target: dev
    image: local-java-api-mm-cq
    restart: unless-stopped
    depends_on:
      - database
    volumes:
      - .:/app:rw
    ports:
      - '${APP_PORT:-8080}:8080'
    environment:
      DB_HOST: database
      DB_DATABASE: $DB_DATABASE
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASSWORD
    command: ["/bin/sh", "-c", "/app/start-app.sh dev ; sleep 36000"]

  database:
    image: mariadb:12.2-ubi
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: $DB_PASSWORD
      MARIADB_ROOT_HOST: '%'
      MARIADB_DATABASE: $DB_DATABASE
      MARIADB_USER: $DB_USER
      MARIADB_PASSWORD: $DB_PASSWORD
      MARIADB_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - mysql:/var/lib/mysql:rw
      - ./docker/test_db_init.sql:/docker-entrypoint-initdb.d/test_db_init.sql:ro
    ports:
      - '${FORWARD_DB_PORT:-63306}:3306'

volumes:
  mysql:
