spring.application.name=mm-cq-java-2
spring.datasource.url=jdbc:mariadb://${DB_HOST:127.0.0.1}/${DB_DATABASE:mm-cq-java}
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:db_password}
spring.flyway.locations=classpath:db/migration
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.main.banner-mode=off

#logging.level.org.springframework.security=DEBUG
logging.level.root=WARN
logging.level.org.flywaydb.core.internal.database.base.Database=ERROR

springdoc.use-fqn=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.swagger-ui.defaultModelExpandDepth=2

app.secret=SecretSecretSecretSecretSecretSecretSecretSecret
app.mm-cq.access-token-ttl=28800
